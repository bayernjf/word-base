name: Verify

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  web-verify:
    name: Web lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: |
          npm -w @wordbase/web exec tsc -- --noEmit
          npm -w @wordbase/desktop exec tsc -- --noEmit
          npm -w @wordbase/mobile exec tsc -- --noEmit
      - name: Build web
        run: npm -w @wordbase/web run build
      - name: Build desktop frontend
        run: npm -w @wordbase/desktop run build
      - name: Build mobile frontend
        run: npm -w @wordbase/mobile run build
      - uses: actions/upload-artifact@v5
        with:
          name: web-dist
          path: apps/web/dist
