name: Generate Preview Screenshot

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Start local preview
        run: npm -w @wordbase/web run preview -- --host 127.0.0.1 --port 4173 > /tmp/wordbase-preview.log 2>&1 &

      - name: Wait for local preview
        run: |
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:4173/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/wordbase-preview.log
          exit 1

      - name: Install Playwright Chromium
        run: npx --yes playwright@1.54.0 install --with-deps chromium

      - name: Generate preview image
        run: |
          npx --yes playwright@1.54.0 screenshot \
            --device="Desktop Chrome" \
            --viewport-size="1200,630" \
            --wait-for-timeout=1000 \
            http://127.0.0.1:4173/ \
            apps/web/public/preview.png

      - name: Commit preview image to feature branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "preview-update-$(date +%Y%m%d-%H%M%S)"
          git add apps/web/public/preview.png
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore(preview): update WordBase image"
          git push -u origin HEAD
          gh pr create --base main --head "$(git rev-parse --abbrev-ref HEAD)" --title "chore(preview): update WordBase image" --body "Automatically generated preview image update"

      - name: Trigger production deployment
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref main
