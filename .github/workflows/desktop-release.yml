name: Desktop Release

on:
  push:
    tags:
      - 'desktop-v*'
    branches:
      - dev
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 0.1.0)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build Desktop (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            os: macos-14
          - platform: windows
            os: windows-latest
          - platform: linux
            os: ubuntu-22.04

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - run: npm ci

      - name: Generate src-tauri via tauri init (idempotent)
        working-directory: apps/desktop
        shell: bash
        run: |
          if [ ! -d src-tauri ]; then
            export CI=true
            npx tauri init --ci \
              --app-name wordbase-desktop \
              --window-title WordBase \
              --frontend-dist ../dist \
              --dev-url http://localhost:3002 \
              --before-dev-command "npm run dev" \
              --before-build-command "npm run build"
          fi
          cp native-templates/tauri.conf.json src-tauri/tauri.conf.json
          mkdir -p src-tauri/capabilities
          cp native-templates/capabilities/default.json src-tauri/capabilities/default.json

      - name: Patch Cargo.toml (add plugins)
        working-directory: apps/desktop/src-tauri
        shell: bash
        run: |
          if ! grep -q tauri-plugin-store Cargo.toml; then
            cat >> Cargo.toml <<'EOF'
          tauri-plugin-clipboard-manager = "2"
          tauri-plugin-notification = "2"
          tauri-plugin-shell = "2"
          tauri-plugin-store = "2"
          EOF
          fi

      - name: Patch lib.rs (register plugins)
        working-directory: apps/desktop/src-tauri/src
        shell: bash
        run: |
          cp ../../native-templates/lib.rs lib.rs

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        with:
          projectPath: apps/desktop
          args: --verbose

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: dist-${{ matrix.platform }}
          path: apps/desktop/src-tauri/target/release/bundle/**/*
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: always() && needs.build.result == 'success'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: release

      - name: Flatten artifact tree
        run: |
          mkdir -p release-flat
          find release -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.deb" -o -name "*.AppImage" \) -exec cp -v {} release-flat/ \;
          ls -la release-flat

      - name: Create GitHub Release
        if: hashFiles('release-flat/*') != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'snapshot' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Dev Snapshot' }}
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          generate_release_notes: ${{ startsWith(github.ref, 'refs/tags/') }}
          files: release-flat/*
          append_body: ${{ !startsWith(github.ref, 'refs/tags/') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
