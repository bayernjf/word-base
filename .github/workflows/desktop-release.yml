name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
      - dev
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 0.1.0, leave empty for snapshot)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  determine-version:
    name: Determine version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      prerelease: ${{ steps.version.outputs.prerelease }}
      release_name: ${{ steps.version.outputs.release_name }}
      create_tag: ${{ steps.version.outputs.create_tag }}
      gen_notes: ${{ steps.version.outputs.gen_notes }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          set -e
          REF="${{ github.ref }}"
          EVENT="${{ github.event_name }}"
          MANUAL_VERSION="${{ github.event.inputs.version }}"

          if [ "$EVENT" = "workflow_dispatch" ] && [ -n "$MANUAL_VERSION" ]; then
            TAG="v${MANUAL_VERSION#v}"
            PRERELEASE="false"
            RELEASE_NAME="$TAG"
            CREATE_TAG="false"
            GEN_NOTES="true"
            echo "Manual dispatch with version: $TAG"
          elif echo "$REF" | grep -q '^refs/tags/v'; then
            TAG="${REF#refs/tags/}"
            PRERELEASE="false"
            RELEASE_NAME="$TAG"
            CREATE_TAG="false"
            GEN_NOTES="true"
            echo "Tag push: $TAG"
          elif [ "$REF" = "refs/heads/main" ]; then
            LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1 || echo "")
            if [ -z "$LATEST_TAG" ]; then
              NEW_TAG="v0.1.0"
            else
              BASE="${LATEST_TAG#v}"
              MAJOR=$(echo "$BASE" | cut -d. -f1)
              MINOR=$(echo "$BASE" | cut -d. -f2)
              PATCH=$(echo "$BASE" | cut -d. -f3)
              PATCH=$((PATCH + 1))
              NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
            fi
            TAG="$NEW_TAG"
            PRERELEASE="false"
            RELEASE_NAME="$NEW_TAG"
            CREATE_TAG="true"
            GEN_NOTES="true"
            echo "Main branch auto-bump: $LATEST_TAG -> $NEW_TAG"
          else
            TAG="snapshot"
            PRERELEASE="true"
            RELEASE_NAME="Dev Snapshot"
            CREATE_TAG="false"
            GEN_NOTES="false"
            echo "Dev branch snapshot"
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT
          echo "release_name=$RELEASE_NAME" >> $GITHUB_OUTPUT
          echo "create_tag=$CREATE_TAG" >> $GITHUB_OUTPUT
          echo "gen_notes=$GEN_NOTES" >> $GITHUB_OUTPUT

      - name: Create and push new tag (main auto-bump)
        if: steps.version.outputs.create_tag == 'true'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-desktop:
    name: Build Desktop (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    needs: determine-version
    env:
      TAURI_SIGNING_PUBKEY: ${{ secrets.TAURI_SIGNING_PUBKEY }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            os: macos-14
          - platform: windows
            os: windows-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - run: npm ci

      - name: Inject version
        run: node scripts/set-version.cjs ${{ needs.determine-version.outputs.tag }}

      - name: Generate src-tauri via tauri init (idempotent)
        working-directory: apps/desktop
        shell: bash
        run: |
          if [ ! -d src-tauri ]; then
            export CI=true
            npx tauri init --ci \
              --app-name wordbase-desktop \
              --window-title WordBase \
              --frontend-dist ../dist \
              --dev-url http://localhost:3002 \
              --before-dev-command "npm run dev" \
              --before-build-command "npm run build"
          fi
          cp native-templates/tauri.conf.json src-tauri/tauri.conf.json
          mkdir -p src-tauri/capabilities
          cp native-templates/capabilities/default.json src-tauri/capabilities/default.json

      - name: Patch Cargo.toml (add plugins)
        working-directory: apps/desktop/src-tauri
        shell: bash
        run: |
          if ! grep -q tauri-plugin-store Cargo.toml; then
            cat >> Cargo.toml <<'EOF'
          tauri-plugin-clipboard-manager = "2"
          tauri-plugin-notification = "2"
          tauri-plugin-shell = "2"
          tauri-plugin-store = "2"
          EOF
          fi

      - name: Patch lib.rs (register plugins)
        working-directory: apps/desktop/src-tauri/src
        shell: bash
        run: |
          cp ../../native-templates/lib.rs lib.rs

      - name: Re-inject version after tauri.conf overwrite
        run: node scripts/set-version.cjs ${{ needs.determine-version.outputs.tag }}

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          args: --verbose

      - name: Rename macOS dmg artifacts
        if: matrix.platform == 'macos'
        working-directory: apps/desktop/src-tauri/target/release/bundle/dmg
        shell: bash
        run: |
          for f in *.dmg; do
            if echo "$f" | grep -q "aarch64"; then
              newname=$(echo "$f" | sed 's/_/-/g' | sed 's/-aarch64/-arm64/')
            else
              newname=$(echo "$f" | sed 's/_/-/g')
            fi
            if [ "$f" != "$newname" ]; then mv "$f" "$newname"; fi
          done
          ls -la

      - name: Rename Windows exe artifacts
        if: matrix.platform == 'windows'
        working-directory: apps/desktop/src-tauri/target/release/bundle/nsis
        shell: bash
        run: |
          for f in *.exe; do
            newname=$(echo "$f" | sed 's/_/-/g' | sed 's/-x64-setup/ Setup/' | sed 's/-setup/ Setup/')
            if [ "$f" != "$newname" ]; then mv "$f" "$newname"; fi
          done
          ls -la

      - name: Upload macOS dmg
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v5
        with:
          name: macOS
          path: |
            apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg.sig
          if-no-files-found: error
          retention-days: 30

      - name: Upload Windows exe
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v5
        with:
          name: Windows
          path: |
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe.sig
          if-no-files-found: error
          retention-days: 30

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: determine-version
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - run: npm ci

      - name: Inject version
        run: node scripts/set-version.cjs ${{ needs.determine-version.outputs.tag }}

      - name: Prebuild Android native project
        working-directory: apps/mobile
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npx expo prebuild --platform android --clean

      - name: Build Android APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename Android APK
        working-directory: apps/mobile/android/app/build/outputs/apk/debug
        run: |
          VERSION="${{ needs.determine-version.outputs.tag }}"
          mv app-debug.apk "WordBase-Android-${VERSION}.apk"
          ls -la

      - name: Upload Android APK
        uses: actions/upload-artifact@v5
        with:
          name: Android
          path: apps/mobile/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

  build-ios:
    name: Build iOS (Simulator)
    runs-on: macos-14
    needs: determine-version
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Inject version
        run: node scripts/set-version.cjs ${{ needs.determine-version.outputs.tag }}

      - name: Prebuild iOS native project
        working-directory: apps/mobile
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        working-directory: apps/mobile/ios
        run: pod install

      - name: Build iOS app for simulator
        working-directory: apps/mobile/ios
        run: |
          xcodebuild \
            -workspace WordBase.xcworkspace \
            -scheme WordBase \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath ../build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Zip iOS app
        working-directory: apps/mobile/build/Build/Products/Debug-iphonesimulator
        run: |
          VERSION="${{ needs.determine-version.outputs.tag }}"
          zip -r "WordBase-iOS-Simulator-${VERSION}.zip" WordBase.app
          ls -la "WordBase-iOS-Simulator-${VERSION}.zip"

      - name: Upload iOS app
        uses: actions/upload-artifact@v5
        with:
          name: iOS
          path: apps/mobile/build/Build/Products/Debug-iphonesimulator/WordBase-iOS-Simulator-*.zip
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish GitHub Release
    needs: [determine-version, build-desktop, build-android, build-ios]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: always()

    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: release

      - name: Flatten artifact tree
        run: |
          mkdir -p release-flat
          find release -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.apk" -o -name "*.zip" -o -name "*.sig" \) -exec cp -v {} release-flat/ \;
          ls -la release-flat

      - name: Generate updater latest.json (formal releases only)
        if: needs.determine-version.outputs.prerelease == 'false'
        run: |
          set -e
          VERSION="${{ needs.determine-version.outputs.tag }}"
          VERSION="${VERSION#v}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          OUT="release-flat/latest.json"

          # Map Tauri triple -> installer filename glob
          # macOS universal not supported here; we ship x86_64 + aarch64
          # Windows x86_64 via NSIS .exe
          declare -A PLATFORM_GLOBS
          PLATFORM_GLOBS["darwin-x86_64"]="*x64.dmg"
          PLATFORM_GLOBS["darwin-aarch64"]="*aarch64.dmg *arm64.dmg"
          PLATFORM_GLOBS["windows-x86_64"]="*.exe"

          echo '{' > "$OUT"
          echo "  \"version\": \"$VERSION\"," >> "$OUT"
          echo "  \"notes\": \"See release notes on GitHub.\"," >> "$OUT"
          echo "  \"pub_date\": \"$PUB_DATE\"," >> "$OUT"
          echo '  "platforms": {' >> "$OUT"

          first=true
          for triple in "${!PLATFORM_GLOBS[@]}"; do
            globs=${PLATFORM_GLOBS[$triple]}
            installer=""
            sigfile=""
            for g in $globs; do
              # shellcheck disable=SC2086
              f=$(ls release-flat/$g 2>/dev/null | head -1 || true)
              if [ -n "$f" ]; then
                installer=$(basename "$f")
                if [ -f "$f.sig" ]; then sigfile="$f.sig"; fi
                # also check for <name>.sig next to file (tauri action sometimes names differently)
                break
              fi
            done
            if [ -z "$installer" ]; then
              echo "Skipping $triple (no installer found)"
              continue
            fi
            sig=""
            if [ -n "$sigfile" ] && [ -f "$sigfile" ]; then
              sig=$(cat "$sigfile")
            else
              # look for any .sig that shares prefix
              alt_sig=$(ls release-flat/${installer}.sig 2>/dev/null | head -1 || true)
              if [ -n "$alt_sig" ]; then sig=$(cat "$alt_sig"); fi
            fi
            if [ -z "$sig" ]; then
              echo "::warning::No signature found for $installer ($triple) – skipping platform"
              continue
            fi
            url="$installer"
            if [ "$first" = true ]; then first=false; else echo "," >> "$OUT"; fi
            echo "    \"$triple\": { \"signature\": \"$sig\", \"url\": \"$url\" }" >> "$OUT"
          done

          echo "" >> "$OUT"
          echo '  }' >> "$OUT"
          echo '}' >> "$OUT"

          echo "--- Generated $OUT ---"
          cat "$OUT"

      - name: Create GitHub Release
        if: hashFiles('release-flat/*') != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.determine-version.outputs.tag }}
          name: ${{ needs.determine-version.outputs.release_name }}
          draft: false
          prerelease: ${{ needs.determine-version.outputs.prerelease == 'true' }}
          generate_release_notes: ${{ needs.determine-version.outputs.gen_notes == 'true' }}
          files: release-flat/*
          append_body: ${{ needs.determine-version.outputs.prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
