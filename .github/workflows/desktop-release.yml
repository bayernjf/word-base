name: Desktop Release

on:
  push:
    tags:
      - 'desktop-v*'
    branches:
      - dev
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 0.1.0)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-desktop:
    name: Build Desktop (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            os: macos-14
          - platform: windows
            os: windows-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - run: npm ci

      - name: Generate src-tauri via tauri init (idempotent)
        working-directory: apps/desktop
        shell: bash
        run: |
          if [ ! -d src-tauri ]; then
            export CI=true
            npx tauri init --ci \
              --app-name wordbase-desktop \
              --window-title WordBase \
              --frontend-dist ../dist \
              --dev-url http://localhost:3002 \
              --before-dev-command "npm run dev" \
              --before-build-command "npm run build"
          fi
          cp native-templates/tauri.conf.json src-tauri/tauri.conf.json
          mkdir -p src-tauri/capabilities
          cp native-templates/capabilities/default.json src-tauri/capabilities/default.json

      - name: Patch Cargo.toml (add plugins)
        working-directory: apps/desktop/src-tauri
        shell: bash
        run: |
          if ! grep -q tauri-plugin-store Cargo.toml; then
            cat >> Cargo.toml <<'EOF'
          tauri-plugin-clipboard-manager = "2"
          tauri-plugin-notification = "2"
          tauri-plugin-shell = "2"
          tauri-plugin-store = "2"
          EOF
          fi

      - name: Patch lib.rs (register plugins)
        working-directory: apps/desktop/src-tauri/src
        shell: bash
        run: |
          cp ../../native-templates/lib.rs lib.rs

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        with:
          projectPath: apps/desktop
          args: --verbose

      - name: Rename macOS dmg artifacts
        if: matrix.platform == 'macos'
        working-directory: apps/desktop/src-tauri/target/release/bundle/dmg
        shell: bash
        run: |
          for f in *.dmg; do
            if echo "$f" | grep -q "aarch64"; then
              newname=$(echo "$f" | sed 's/_/-/g' | sed 's/-aarch64/-arm64/')
            else
              newname=$(echo "$f" | sed 's/_/-/g')
            fi
            if [ "$f" != "$newname" ]; then
              mv "$f" "$newname"
            fi
          done
          ls -la

      - name: Rename Windows exe artifacts
        if: matrix.platform == 'windows'
        working-directory: apps/desktop/src-tauri/target/release/bundle/nsis
        shell: bash
        run: |
          for f in *.exe; do
            newname=$(echo "$f" | sed 's/_/-/g' | sed 's/-x64-setup/ Setup/' | sed 's/-setup/ Setup/')
            if [ "$f" != "$newname" ]; then
              mv "$f" "$newname"
            fi
          done
          ls -la

      - name: Upload macOS dmg
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v5
        with:
          name: macOS
          path: apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 30

      - name: Upload Windows exe
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v5
        with:
          name: Windows
          path: apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 30

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - run: npm ci

      - name: Build mobile frontend
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm -w @wordbase/mobile run build

      - name: Sync Capacitor
        working-directory: apps/mobile
        run: npx cap sync android

      - name: Build Android APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Android APK
        uses: actions/upload-artifact@v5
        with:
          name: Android
          path: apps/mobile/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

  build-ios:
    name: Build iOS (Simulator)
    runs-on: macos-14
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build mobile frontend
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm -w @wordbase/mobile run build

      - name: Sync Capacitor
        working-directory: apps/mobile
        run: npx cap sync ios

      - name: Install CocoaPods
        working-directory: apps/mobile/ios/App
        run: pod install

      - name: Build iOS app for simulator
        working-directory: apps/mobile/ios/App
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath ../../build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Zip iOS app
        working-directory: apps/mobile/build/Build/Products/Debug-iphonesimulator
        run: |
          zip -r WordBase-iOS-Simulator.zip App.app
          ls -la WordBase-iOS-Simulator.zip

      - name: Upload iOS app
        uses: actions/upload-artifact@v5
        with:
          name: iOS
          path: apps/mobile/build/Build/Products/Debug-iphonesimulator/WordBase-iOS-Simulator.zip
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish GitHub Release
    needs: [build-desktop, build-android, build-ios]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: release

      - name: Flatten artifact tree
        run: |
          mkdir -p release-flat
          find release -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.apk" -o -name "*.zip" \) -exec cp -v {} release-flat/ \;
          ls -la release-flat

      - name: Create GitHub Release
        if: hashFiles('release-flat/*') != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'snapshot' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Dev Snapshot' }}
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          generate_release_notes: ${{ startsWith(github.ref, 'refs/tags/') }}
          files: release-flat/*
          append_body: ${{ !startsWith(github.ref, 'refs/tags/') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
