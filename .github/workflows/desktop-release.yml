name: Release

# Release Workflow
#
# 两种触发方式：
#   1. 推送 desktop-v* tag → 正式发布（prerelease: false，生成 release notes）
#   2. push 到 dev 分支 → Dev Snapshot（prerelease: true，tag 为 snapshot，
#      每次覆盖上一个，产物始终指向最新 dev 的可用构建）
#
# 使用方式（正式发版）：
#   git tag desktop-v0.1.0
#   git push origin desktop-v0.1.0
#
# 使用方式（Dev Snapshot）：
#   push 到 dev 分支自动触发，无需手动操作。

on:
  push:
    tags:
      - 'desktop-v*'
    branches:
      - dev
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 0.1.0)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-desktop:
    name: Build Desktop (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            os: macos-14
          - platform: windows
            os: windows-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - run: npm ci

      - name: Generate src-tauri via tauri init (idempotent)
        working-directory: apps/desktop
        shell: bash
        run: |
          if [ ! -d src-tauri ]; then
            export CI=true
            npx tauri init --ci \
              --app-name wordbase-desktop \
              --window-title WordBase \
              --frontend-dist ../dist \
              --dev-url http://localhost:3002 \
              --before-dev-command "npm run dev" \
              --before-build-command "npm run build"
          fi
          cp native-templates/tauri.conf.json src-tauri/tauri.conf.json
          mkdir -p src-tauri/capabilities
          cp native-templates/capabilities/default.json src-tauri/capabilities/default.json

      - name: Patch Cargo.toml (add plugins)
        working-directory: apps/desktop/src-tauri
        shell: bash
        run: |
          if ! grep -q tauri-plugin-store Cargo.toml; then
            cat >> Cargo.toml <<'EOF'
          tauri-plugin-clipboard-manager = "2"
          tauri-plugin-notification = "2"
          tauri-plugin-shell = "2"
          tauri-plugin-store = "2"
          EOF
          fi

      - name: Patch lib.rs (register plugins)
        working-directory: apps/desktop/src-tauri/src
        shell: bash
        run: |
          cp ../../native-templates/lib.rs lib.rs

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          args: --verbose

      - name: Upload macOS dmg artifacts
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v5
        with:
          name: dist-macos
          path: apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 30

      - name: Upload Windows exe artifacts
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v5
        with:
          name: dist-windows
          path: apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 30

  build-ios:
    name: Build iOS
    runs-on: macos-14
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build mobile frontend
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm -w @wordbase/mobile run build

      - name: Install CocoaPods
        run: sudo gem install cocoapods

      - name: Add iOS platform
        working-directory: apps/mobile
        run: npx cap add ios || npx cap sync ios

      - name: Build iOS IPA
        working-directory: apps/mobile/ios/App
        run: |
          xcodebuild build \
            -scheme WordBase \
            -destination 'generic/platform=iOS' \
            -archivePath build/WordBase.xcarchive \
            archive
          xcodebuild -exportArchive \
            -archivePath build/WordBase.xcarchive \
            -exportPath build \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -allowProvisioningUpdates
        env:
          DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer

      - name: Upload iOS IPA
        uses: actions/upload-artifact@v5
        with:
          name: dist-ios
          path: apps/mobile/ios/App/build/*.ipa
          if-no-files-found: warn
          retention-days: 30

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - run: npm ci

      - name: Build mobile frontend
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm -w @wordbase/mobile run build

      - name: Add Android platform
        working-directory: apps/mobile
        run: npx cap add android || npx cap sync android

      - name: Build Android APK
        working-directory: apps/mobile/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Android APK
        uses: actions/upload-artifact@v5
        with:
          name: dist-android
          path: apps/mobile/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish GitHub Release
    needs: [build-desktop, build-ios, build-android]
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: release

      - name: Flatten artifact tree
        run: |
          mkdir -p release-flat
          find release -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.ipa" -o -name "*.apk" \) -exec cp -v {} release-flat/ \;
          ls -la release-flat

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'snapshot' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Dev Snapshot' }}
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          generate_release_notes: ${{ startsWith(github.ref, 'refs/tags/') }}
          files: release-flat/*
          append_body: ${{ !startsWith(github.ref, 'refs/tags/') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
