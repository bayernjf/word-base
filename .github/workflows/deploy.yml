name: Deploy Web

on:
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Web (Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build web frontend (Vite)
        working-directory: apps/web
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          VITE_GA_MEASUREMENT_ID: ${{ secrets.VITE_GA_MEASUREMENT_ID }}
          VITE_CLARITY_PROJECT_ID: ${{ secrets.VITE_CLARITY_PROJECT_ID }}
        run: npm run build

      - name: Copy _worker.js into Vite dist
        # Vite already copies public/_worker.js into dist/, but overwrite with
        # the canonical version from apps/web/public/ in case a stale one exists.
        run: |
          cp apps/web/public/_worker.js apps/web/dist/_worker.js 2>/dev/null || true

      - name: Upload web dist artifact
        uses: actions/upload-artifact@v5
        with:
          name: web-dist
          path: apps/web/dist
          if-no-files-found: error
          include-hidden-files: true

  deploy-vercel:
    name: Deploy to Vercel (API only)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Deploy Next.js API to Vercel
        id: vercel-deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AI_CONFIG_ENCRYPTION_KEY: ${{ secrets.AI_CONFIG_ENCRYPTION_KEY }}
        run: |
          mkdir -p .vercel
          echo '{"orgId":"'$VERCEL_ORG_ID'","projectId":"'$VERCEL_PROJECT_ID'"}' > .vercel/project.json

          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            DEPLOY_FLAGS="--prod"
            ALIAS_NAME=""
          else
            DEPLOY_FLAGS=""
            ALIAS_NAME="dev-word-base"
          fi

          set +e
          DEPLOY_OUTPUT=$(vercel deploy --token="$VERCEL_TOKEN" --yes $DEPLOY_FLAGS \
            --env NEXT_PUBLIC_SUPABASE_URL="$NEXT_PUBLIC_SUPABASE_URL" \
            --env NEXT_PUBLIC_SUPABASE_ANON_KEY="$NEXT_PUBLIC_SUPABASE_ANON_KEY" \
            --env NEXT_PUBLIC_API_BASE_URL="$NEXT_PUBLIC_API_BASE_URL" \
            --env SUPABASE_SERVICE_ROLE_KEY="$SUPABASE_SERVICE_ROLE_KEY" \
            --env AI_CONFIG_ENCRYPTION_KEY="$AI_CONFIG_ENCRYPTION_KEY" \
            2>&1)
          DEPLOY_EXIT=$?
          set -e

          echo "$DEPLOY_OUTPUT"

          if [ "$DEPLOY_EXIT" -ne 0 ]; then
            echo "::error::Vercel deploy failed with exit code $DEPLOY_EXIT"
            exit "$DEPLOY_EXIT"
          fi

          DEPLOY_URL=$(echo "$DEPLOY_OUTPUT" | grep -oE 'https://[^ ]*\.vercel\.app' | tail -1)
          if [ -z "$DEPLOY_URL" ]; then
            echo "::error::Could not detect deployment URL in Vercel output"
            exit 1
          fi

          if [ -n "$ALIAS_NAME" ]; then
            echo "Setting alias $ALIAS_NAME -> $DEPLOY_URL"
            vercel alias set "$DEPLOY_URL" "$ALIAS_NAME" --token="$VERCEL_TOKEN"
            STABLE_URL="https://${ALIAS_NAME}.vercel.app"
          elif [ -n "$NEXT_PUBLIC_API_BASE_URL" ]; then
            STABLE_URL="${NEXT_PUBLIC_API_BASE_URL%/}"
          else
            STABLE_URL="$DEPLOY_URL"
          fi

          echo "vercel-url=$STABLE_URL" >> "$GITHUB_OUTPUT"
          echo "## Vercel Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Name | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Status | ✅ Deployed |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Deployment URL | [${DEPLOY_URL}](${DEPLOY_URL}) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Health Gate URL | [${STABLE_URL}](${STABLE_URL}) |" >> "$GITHUB_STEP_SUMMARY"

      - name: Verify Vercel API health
        env:
          API_BASE_URL: ${{ steps.vercel-deploy.outputs.vercel-url }}
        run: |
          for attempt in $(seq 1 12); do
            BODY_FILE=$(mktemp)
            RESULT=$(curl --silent --show-error --location --output "$BODY_FILE" --write-out '%{http_code}|%{content_type}' "$API_BASE_URL/api/v1/health" || true)
            STATUS=${RESULT%%|*}
            CONTENT_TYPE=${RESULT#*|}
            BODY=$(<"$BODY_FILE")
            rm -f "$BODY_FILE"

            if [ "$STATUS" = "200" ] && [[ "$CONTENT_TYPE" == application/json* ]] && [[ "$BODY" == *'"ok":true'* ]]; then
              echo "Vercel API health check passed on attempt $attempt"
              exit 0
            fi

            echo "Attempt $attempt failed: status=$STATUS content-type=$CONTENT_TYPE body=$BODY"
            sleep 10
          done

          echo "::error::Vercel API health check failed"
          exit 1

  deploy-cloudflare:
    name: Deploy to Cloudflare Pages (Vite static)
    runs-on: ubuntu-latest
    needs: [build, deploy-vercel]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    steps:
      - uses: actions/checkout@v5

      - name: Download web dist
        uses: actions/download-artifact@v5
        with:
          name: web-dist
          path: apps/web/dist

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: word-base
          directory: apps/web/dist
          branch: ${{ github.ref == 'refs/heads/main' && 'main' || 'dev' }}

      - name: Verify Cloudflare deployment
        env:
          SITE_BASE_URL: ${{ github.ref == 'refs/heads/main' && 'https://word-base.pages.dev' || 'https://dev.word-base.pages.dev' }}
        run: |
          check_status() {
            local path="$1"
            local expected="$2"
            local status
            status=$(curl --silent --show-error --location --output /dev/null --write-out '%{http_code}' "$SITE_BASE_URL$path" || true)
            [ "$status" = "$expected" ]
          }

          check_json() {
            local path="$1"
            local expected_status="$2"
            local expected_body="$3"
            local body_file
            local result
            local status
            local content_type
            local body
            body_file=$(mktemp)
            result=$(curl --silent --show-error --location --output "$body_file" --write-out '%{http_code}|%{content_type}' "$SITE_BASE_URL$path" || true)
            status=${result%%|*}
            content_type=${result#*|}
            body=$(<"$body_file")
            rm -f "$body_file"
            [ "$status" = "$expected_status" ] && [[ "$content_type" == application/json* ]] && [[ "$body" == *"$expected_body"* ]]
          }

          for attempt in $(seq 1 12); do
            if check_status "/" "200" \
              && check_status "/app" "200" \
              && check_json "/api/v1/health" "200" '"ok":true' \
              && check_json "/api/v1/words" "401" '"error":"Unauthorized"'; then
              echo "Cloudflare deployment verification passed on attempt $attempt"
              exit 0
            fi

            echo "Cloudflare verification attempt $attempt failed"
            sleep 10
          done

          echo "::error::Cloudflare deployment verification failed"
          exit 1
