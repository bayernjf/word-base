name: Deploy Web

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build web frontend
        working-directory: apps/web
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AI_CONFIG_ENCRYPTION_KEY: ${{ secrets.AI_CONFIG_ENCRYPTION_KEY }}
        run: npm run build

      - name: Upload web build artifact
        uses: actions/upload-artifact@v5
        with:
          name: web-build
          path: apps/web/.next
          if-no-files-found: error
          include-hidden-files: true

  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AI_CONFIG_ENCRYPTION_KEY: ${{ secrets.AI_CONFIG_ENCRYPTION_KEY }}
        # Deploy from repo root: root vercel.json declares framework=nextjs,
        # buildCommand runs npm -w @wordbase/web run build, outputDirectory=apps/web/.next.
        # This ensures shared/ and packages/ are uploaded and Next.js resolves
        # workspace dependencies correctly.
        run: |
          mkdir -p .vercel
          echo '{"orgId":"'$VERCEL_ORG_ID'","projectId":"'$VERCEL_PROJECT_ID'"}' > .vercel/project.json

          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            DEPLOY_FLAGS="--prod"
          else
            DEPLOY_FLAGS=""
          fi

          set +e
          DEPLOY_OUTPUT=$(vercel deploy --token=$VERCEL_TOKEN --yes $DEPLOY_FLAGS \
            --env NEXT_PUBLIC_SUPABASE_URL="$NEXT_PUBLIC_SUPABASE_URL" \
            --env NEXT_PUBLIC_SUPABASE_ANON_KEY="$NEXT_PUBLIC_SUPABASE_ANON_KEY" \
            --env NEXT_PUBLIC_API_BASE_URL="$NEXT_PUBLIC_API_BASE_URL" \
            --env SUPABASE_SERVICE_ROLE_KEY="$SUPABASE_SERVICE_ROLE_KEY" \
            --env AI_CONFIG_ENCRYPTION_KEY="$AI_CONFIG_ENCRYPTION_KEY" \
            2>&1)
          DEPLOY_EXIT=$?
          set -e

          echo "$DEPLOY_OUTPUT"

          if [ $DEPLOY_EXIT -ne 0 ]; then
            echo "::error::Vercel deploy failed with exit code $DEPLOY_EXIT"
            exit $DEPLOY_EXIT
          fi

          # Vercel prints the preview URL as the last https://*.vercel.app line
          DEPLOY_URL=$(echo "$DEPLOY_OUTPUT" | grep -oE 'https://[^ ]*\.vercel\.app' | tail -1)

          if [ -n "$DEPLOY_URL" ]; then
            echo "## Vercel Deployment Summary" >> $GITHUB_STEP_SUMMARY
            echo "| Name | Result |" >> $GITHUB_STEP_SUMMARY
            echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
            echo "| Status | ✅ Deployed |" >> $GITHUB_STEP_SUMMARY
            echo "| Preview URL | [${DEPLOY_URL}](${DEPLOY_URL}) |" >> $GITHUB_STEP_SUMMARY
            echo "vercel-url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          else
            echo "## Vercel Deployment Summary" >> $GITHUB_STEP_SUMMARY
            echo "| Name | Result |" >> $GITHUB_STEP_SUMMARY
            echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
            echo "| Status | ❌ URL not detected in output |" >> $GITHUB_STEP_SUMMARY
            echo "::error::Could not detect deployment URL in Vercel output"
            exit 1
          fi
        id: vercel-deploy

  deploy-cloudflare:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: [build, deploy-vercel]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    steps:
      - uses: actions/checkout@v5

      - name: Download web build
        uses: actions/download-artifact@v5
        with:
          name: web-build
          path: apps/web/.next

      - name: Prepare Cloudflare deployment files
        run: |
          set -e
          # Copy static/server assets into standalone output
          if [ -d apps/web/.next/standalone ]; then
            cp -R apps/web/.next/static apps/web/.next/standalone/apps/web/.next/ 2>/dev/null || true
            cp -r apps/web/.next/server apps/web/.next/standalone/apps/web/.next/ 2>/dev/null || true
            # Copy manifest files that exist (Next.js 15 doesn't generate all of them)
            for f in paths.json prerender-manifest.js server-reference-manifest.js build-manifest.json react-loadable-manifest.json export-marker.json images-manifest.json next-font-manifest.json; do
              [ -f "apps/web/.next/$f" ] && cp "apps/web/.next/$f" "apps/web/.next/standalone/apps/web/.next/" || true
            done
          fi
          cp apps/web/package.json apps/web/.next/standalone/apps/web/ 2>/dev/null || true
          if [ -f apps/web/.next/standalone/apps/web/package.json ]; then
            sed -i 's/"scripts": {/"scripts": {},/' apps/web/.next/standalone/apps/web/package.json || true
          fi
          # Copy _worker.js to deployment root so Cloudflare Pages runs it as an Advanced mode Worker.
          # Next.js copies public/ assets into .next/standalone/apps/web/public/, but Cloudflare Pages
          # only picks up _worker.js from the output root, not from public/.
          cp apps/web/public/_worker.js apps/web/.next/standalone/apps/web/_worker.js 2>/dev/null || true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: word-base
          directory: apps/web/.next/standalone/apps/web
          var: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_API_BASE_URL=${{ needs.deploy-vercel.outputs.vercel-url }}
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
            AI_CONFIG_ENCRYPTION_KEY=${{ secrets.AI_CONFIG_ENCRYPTION_KEY }}
