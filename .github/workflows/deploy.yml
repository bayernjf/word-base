name: Deploy Web

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build web frontend
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm -w @wordbase/web run build

      - name: Upload web dist artifact
        uses: actions/upload-artifact@v5
        with:
          name: web-dist
          path: apps/web/dist

  deploy-cloudflare:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    steps:
      - uses: actions/checkout@v5

      - name: Download web dist
        uses: actions/download-artifact@v5
        with:
          name: web-dist
          path: apps/web/dist

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: word-base
          directory: apps/web/dist

  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    steps:
      - uses: actions/checkout@v5

      - name: Download web dist
        uses: actions/download-artifact@v5
        with:
          name: web-dist
          path: apps/web/dist

      - name: Deploy to Vercel
        working-directory: apps/web
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          mkdir -p .vercel
          echo '{"orgId":"'$VERCEL_ORG_ID'","projectId":"'$VERCEL_PROJECT_ID'"}' > .vercel/project.json
          
          mkdir -p .vercel/output/static
          cp -r dist/* .vercel/output/static/
          echo '{"version":3,"routes":[{"src":"/app(/.*)?","dest":"/app/index.html"},{"handle":"filesystem"},{"src":"/.*","dest":"/index.html"}]}' > .vercel/output/config.json
          
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            DEPLOY_OUTPUT=$(npx vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN --yes 2>&1)
          else
            DEPLOY_OUTPUT=$(npx vercel deploy --prebuilt --token=$VERCEL_TOKEN --yes 2>&1)
          fi
          
          echo "$DEPLOY_OUTPUT"
          
          DEPLOY_URL=$(echo "$DEPLOY_OUTPUT" | grep -o 'https://[^ ]*\.vercel\.app' | head -1)
          
          if [ -n "$DEPLOY_URL" ]; then
            echo "## Vercel Deployment Summary" >> $GITHUB_STEP_SUMMARY
            echo "| Name | Result |" >> $GITHUB_STEP_SUMMARY
            echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
            echo "| Status | ✅ Deployed |" >> $GITHUB_STEP_SUMMARY
            echo "| Preview URL | [${DEPLOY_URL}](${DEPLOY_URL}) |" >> $GITHUB_STEP_SUMMARY
          else
            echo "## Vercel Deployment Summary" >> $GITHUB_STEP_SUMMARY
            echo "| Name | Result |" >> $GITHUB_STEP_SUMMARY
            echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
            echo "| Status | ⚠️ URL not detected |" >> $GITHUB_STEP_SUMMARY
          fi
